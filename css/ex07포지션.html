<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
        }
        #div1{
            background-color: aqua;
        }
        #div2{
            position:relative;
            left: 200px;
            background-color: rgb(111, 0, 255);
            z-index: 3;
        }
        #div5{
            position: relative;
            width: 300px;
            height: 300px;
            background-color: black;
        }
        #div3{
            position: absolute;
            background-color: rgb(255, 196, 0);
            left: 100px;
            bottom : 100px;
            z-index: 1;
        }
        #div4{
            background-color: rgb(255, 0, 0);
        }
    </style>
</head>
<body>
    <div id="div1"></div>
    <div id="div2"></div>
    <div id="div5">
        <div id="div3"></div>
    </div>
        
    <div id="div4"></div>
</body>
</html>
