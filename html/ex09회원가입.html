<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table  width = "400px">
        <tr bgcolor = "gray" height = "50px">
            <th colspan="2">Step1 : 아이디/비번입력</th>

        </tr>
        <tr height="35px" bgcolor="whitesmoke">
            <td align = "right">아이디</td>
            <td><input type="text" maxlength="4" placeholder="아이디를 입력하세요"></td>

        </tr>
        <tr height="35px" bgcolor="whitesmoke">
            <td align = "right">비밀번호</td>
            <td><input type="password"></td>

        </tr>
        <tr height="35px" bgcolor="whitesmoke">
            <td align = "right">비밀번호 확인</td>
            <td><input type="password"></td>
        </tr>

        <tr bgcolor = "gray" height = "50px">
            <th colspan="2">Step2 : 개인정보</th>

        </tr>
        <tr height="35px" bgcolor="whitesmoke">
            <td align = "right">성별</td>
            <td><span>남</span><input type="radio" name="gender" value="men">
                <span>여</span><input type="radio" name="gender" value="men"></td>
            
        </tr>

        <tr height="35px" bgcolor="whitesmoke">
            <td align = "right">혈액형</td>
            <td><select>
                <option>A형</option>
                <option>B형</option>
                <option>AB형</option>
                <option>O형</option>
            </select></td>

        </tr>
        <tr height="35px" bgcolor="whitesmoke">
            <td align = "right">생일</td>
            <td><input type="date"></td>
        </tr>

        <tr bgcolor = "gray" height = "50px">
            <th colspan="2">Step3 : 선호도</th>

        </tr>
        <tr height="35px" bgcolor="whitesmoke">
            <td align = "right">취미</td>
            <td>
                <span>축구</span><input type="checkbox" name="hobby">
                <span>야구</span><input type="checkbox" name="hobby">
                <span>농구</span><input type="checkbox" name="hobby">
            </td>
        </tr>
        <tr height="35px" bgcolor="whitesmoke">
            <td align = "right">좋아하는 색깔</td>
            <td><input type="color"></td>

        </tr>
        <tr bgcolor = "gray" height = "50px">
            <th colspan="2">Step4 : 적고 싶은 말</th>

        </tr>
        <tr>
            <td colspan="2">
                <textarea  cols="60" rows="5"></textarea>
            </td>
            
        </tr>

        <tr>
            <td colspan="2" align="center" bgcolor="whitesmoke">
                <input type="submit">
                <input type="reset">
            </td>
            
        </tr>
            
        
        
       
    </table>
</body>
</html>
